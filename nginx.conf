# client/nginx.conf
# Serves the React SPA build and falls back to index.html for client-side routing.
# Listens on 8080 to match Cloud Run's expected container port.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
